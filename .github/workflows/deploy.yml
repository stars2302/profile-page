name: GitHub Pages 배포

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v6

      - name: Node.js 설정
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: 프로젝트 빌드
        run: npm run build

      - name: GitHub Pages 설정
        uses: actions/configure-pages@v6

      - name: 빌드 결과 업로드
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v5
